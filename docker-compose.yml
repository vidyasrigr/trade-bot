version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: options_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-options}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-options_secret}
      POSTGRES_DB: ${POSTGRES_DB:-options_trading}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-options} -d ${POSTGRES_DB:-options_trading}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: options_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
